<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tizenflix</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/player.css" />
</head>
<body class="app-shell">
  <noscript><p class="noscript-warn">JavaScript is required for Tizenflix.</p></noscript>
  <div id="focusHint">Focused: —</div>

  <nav class="app-nav setup-only" aria-label="Main">
    <h1 class="app-logo">TIZENFLIX</h1>
    <div class="app-nav-links" id="appNav">
      <button type="button" data-screen="home" class="nav-active">Home</button>
      <button type="button" data-screen="search">Search</button>
      <button type="button" data-screen="settings">Settings</button>
    </div>
  </nav>

  <main id="appRoot" class="app-main" role="main"></main>

  <!-- Player layer — shared by player screen -->
  <div id="videoWrap" class="video-wrap hidden">
    <div class="video-aspect">
      <video id="video" playsinline></video>
    </div>
    <p id="nowPlaying" class="now-playing">Video appears here when playback starts.</p>
  </div>

  <pre id="debugOverlay" class="debug-overlay hidden">Debug log...</pre>

  <div id="playbackBar" class="playback-bar">
    <div class="row">
      <button type="button" id="playPauseBtn">Play / Pause</button>
      <button type="button" id="stopBtnBar" class="secondary">Stop</button>
      <span id="playbackStatus" style="color:#b3b3b3;font-size:24px;">Playing...</span>
    </div>
  </div>

  <script src="lib/hls.min.js"></script>
  <script src="dist/app.bundle.js"></script>
</body>
</html>
